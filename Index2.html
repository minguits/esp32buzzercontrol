      <div class="p-6">

          <span class="text-xs font-bold uppercase tracking-wider text-slate-400 block">Pulse Triggers</span>
          <div class="grid grid-cols-2 gap-4">
            <button onclick="triggerPulse('start')" class="flex flex-col items-center justify-center p-5 bg-emerald-600/10 hover:bg-emerald-600/20 active:scale-95 border border-emerald-500/20 rounded-2xl transition-all group">
              <div class="bg-emerald-500 text-slate-900 p-3 rounded-full shadow-lg group-hover:scale-110 transition-transform">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
              <span class="mt-3 font-semibold text-emerald-400 text-sm">Pulse Set (TR)</span>
            </button>

            <button onclick="triggerPulse('stop')" class="flex flex-col items-center justify-center p-5 bg-rose-600/10 hover:bg-rose-600/20 active:scale-95 border border-rose-500/20 rounded-2xl transition-all group">
              <div class="bg-rose-500 text-white p-3 rounded-full shadow-lg group-hover:scale-110 transition-transform">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h12V5H6v14z"/></svg>

            </button>

  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 border border-slate-700 text-slate-200 px-5 py-3 rounded-2xl shadow-2xl flex items-center space-x-3 transition-all duration-300 transform translate-y-24 opacity-0 pointer-events-none z-50 max-w-sm w-[90%]">
    <div id="toast-icon" class="bg-emerald-500/20 text-emerald-400 p-1.5 rounded-lg flex-shrink-0"></div>
    <div class="flex-1 min-w-0"><p id="toast-msg" class="text-xs text-slate-300 font-medium"></p></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA14eMUrW8_O8EfYD9wAw991ErIhu11jY8",
      databaseURL: "https://esp32-buzzer-c7e26-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    auth.signInWithEmailAndPassword("johnpaulminguito@gmail.com", "031403")
      .then(() => {
        document.getElementById('connection-badge').className = "text-xs text-emerald-400 flex items-center gap-1.5 font-medium";
        document.getElementById('connection-badge').innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Live Monitoring`;
        initDatabaseListeners();
      })
      .catch((err) => {
        document.getElementById('connection-badge').className = "text-xs text-rose-400 font-medium";
        document.getElementById('connection-badge').innerText = "Auth Error";
        console.error(err);
      });

    function initDatabaseListeners() {
      db.ref('/gpio1').on('value', (snapshot) => updatePinBadge('badge-gpio1', snapshot.val()));
      db.ref('/gpio2').on('value', (snapshot) => updatePinBadge('badge-gpio2', snapshot.val()));
      
      // The visual state updates ONLY when the physical loop changes /gpio3
      db.ref('/gpio3').on('value', (snapshot) => {
        const val = snapshot.val();
        updatePinBadge('badge-gpio3', val);
        updateMotorUI(val);
      });
    }

    function updatePinBadge(id, state) {
      document.getElementById(id).className = state == 1 
        ? "inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-lg shadow-emerald-500/50 mt-1" 
        : "inline-block w-2.5 h-2.5 rounded-full bg-slate-600 mt-1";
    }

    function updateMotorUI(state) {
      const text = document.getElementById('motor-status-text');
      const info = document.getElementById('telemetry-info');
      const blades = document.getElementById('motor-blades');
      const outer = document.getElementById('motor-outer');

      if (state == 1) {
        text.innerText = "RUNNING";
        text.className = "text-2xl font-black text-emerald-400 tracking-wide";
        info.innerText = "Latch Closed | Circuit Engaged";
        blades.classList.add('spin-motor-fast', 'text-emerald-400');
        outer.classList.add('border-emerald-500/50');
      } else {
        text.innerText = "OFF";
        text.className = "text-2xl font-black text-rose-400 tracking-wide";
        info.innerText = "Latch Open | Circuit Open";
        blades.className = "w-12 h-12 text-slate-500 motor-transition";
        outer.className = "absolute inset-0 rounded-full border-2 border-slate-700 flex items-center justify-center";
      }
    }

    function triggerPulse(action) {
      const targetPin = action === 'start' ? '/gpio1' : '/gpio2';
      db.ref(targetPin).set(1);
      showToast(`Triggering Latch Line (${action === 'start' ? 'SET' : 'RESET'})`);

      setTimeout(() => {
        db.ref(targetPin).set(0);
      }, 800);
    }

    let toastTimeout;
    function showToast(message) {
      clearTimeout(toastTimeout);
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').innerText = message;
      toast.classList.remove('translate-y-24', 'opacity-0', 'pointer-events-none');
      toastTimeout = setTimeout(() => toast.classList.add('translate-y-24', 'opacity-0', 'pointer-events-none'), 3000);
    }
  </script>
</body>
